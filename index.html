<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, #ff758c);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% {background-position: 0% 50%}
            50% {background-position: 100% 50%}
            100% {background-position: 0% 50%}
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            z-index: 2;
        }

        .page {
            display: none;
            animation: fade 0.8s ease-out;
        }

        .active { display: block; }

        @keyframes fade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #formBox {
            background: rgba(255, 255, 255, 0.25);
            padding: 30px 20px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-size: 16px;
            text-align: center;
            margin-bottom: 10px;
        }

        button {
            margin-top: 10px;
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            background: #ff4d6d;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:disabled { background: #e09ba9; cursor: not-allowed; opacity: 0.7; }

        .clue {
            font-size: 12px;
            margin: 15px 0;
            color: rgba(255, 255, 255, 0.9);
            font-style: italic;
        }

        .text-box {
            height: 250px;
            overflow-y: auto;
            padding: 15px;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            text-align: left;
            font-size: 1.1rem;
        }

        .heart {
            position: fixed;
            top: -20px;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="page1" class="page active">
        <div id="formBox">
            <h1>Hi, It's for you!</h1>
            <p id="label">Masukin sandi dulu ya...</p>
            <input type="password" id="password" placeholder="Ketik di sini..." autofocus>
            <p class="clue">Clue: Nama teman sekelasmu yang ikut PMR</p>
            <button onclick="cek()">Masuk ✨</button>
        </div>
    </div>

    <div id="page2" class="page">
        <h2>Aku mau bilang...</h2>
        <div class="text-box" id="scrollBox">
            <p id="text"></p>
        </div>
        <button id="nextBtn" onclick="nextPage()" disabled>Tunggu sebentar...</button>
    </div>

    <div id="page3" class="page">
        <div id="formBox">
            <h1>Terakhir...</h1>
            <p>Terima kasih sudah mau membaca sampai habis.</p>
            <h2 style="color: #ff4d6d; text-shadow: 1px 1px 2px rgba(0,0,0,0.1);">Happy 18th Birthday! 🎂</h2>
            <p style="font-size: 0.9rem;">Semoga harimu selalu indah.</p>
        </div>
    </div>
</div>

<audio id="myLagu" loop>
    <source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>
const sandiList = ["fanezha","nezha","fanesa","fanes","nejul","nesha","nesa"];
const lagu = document.getElementById("myLagu");
const kalimat = [
    "Aku ga jago ngomong langsung...",
    "Tapi lewat ini aku pengen kamu tau...",
    "Setiap hari mengenalmu itu berarti banget...",
    "Aku selalu bersyukur bisa kenal kamu...",
    "Dan kalau disuruh milih lagi...",
    "Aku bakal tetap pilih kamu ❤️"
];

function cek() {
    let input = document.getElementById("password").value.toLowerCase().trim();
    
    if (sandiList.includes(input)) {
        document.getElementById("page1").classList.remove("active");
        document.getElementById("page2").classList.add("active");
        
        // AUDIO MULAI (Hanya di halaman 2)
        lagu.play().catch(e => console.log("Audio butuh interaksi"));
        
        mulaiTyping();
        startHearts();
    } else {
        let label = document.getElementById("label");
        let box = document.getElementById("formBox");
        label.innerText = "Sandi salah!";
        box.classList.add("shake");
        setTimeout(() => box.classList.remove("shake"), 400);
    }
}

// Support Enter Key
document.getElementById("password").addEventListener("keypress", (e) => {
    if (e.key === "Enter") cek();
});

let i = 0, j = 0;
function mulaiTyping() {
    if (i < kalimat.length) {
        let textEl = document.getElementById("text");
        let scrollBox = document.getElementById("scrollBox");
        
        if (j < kalimat[i].length) {
            textEl.innerHTML += kalimat[i].charAt(j);
            j++;
            setTimeout(mulaiTyping, 50);
        } else {
            textEl.innerHTML += "<br><br>";
            i++;
            j = 0;
            scrollBox.scrollTo({ top: scrollBox.scrollHeight, behavior: "smooth" });
            setTimeout(mulaiTyping, 800);
        }
    } else {
        let btn = document.getElementById("nextBtn");
        btn.disabled = false;
        btn.innerText = "Lanjut ❤️";
    }
}

// FUNGSI PINDAH HALAMAN (SUDAH DIPERBAIKI)
function nextPage() {
    let btn = document.getElementById("nextBtn");
    btn.disabled = true;
    btn.innerText = "Tunggu ya...";

    // 1. Matikan audio secara halus (Fade Out)
    let vol = 1;
    let fadeOut = setInterval(() => {
        if (vol > 0.1) {
            vol -= 0.1;
            lagu.volume = vol;
        } else {
            clearInterval(fadeOut);
            lagu.pause(); // Musik berhenti
            lagu.currentTime = 0; // Reset ke awal
            
            // 2. Beri jeda 2 detik dalam keadaan hening
            setTimeout(() => {
                // 3. Pindah ke halaman 3
                document.getElementById("page2").classList.remove("active");
                document.getElementById("page3").classList.add("active");
            }, 1000); 
        }
    }, 100);
}

function startHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 15) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        heart.style.opacity = Math.random();
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }, 400);
}
</script>

</body>
</html>
